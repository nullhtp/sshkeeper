name: Release

on:
  push:
    tags: ["v*"]

permissions:
  contents: write

env:
  CARGO_TERM_COLOR: always

jobs:
  build:
    name: Build (${{ matrix.target }})
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        include:
          - target: aarch64-apple-darwin
            os: macos-latest
          - target: x86_64-apple-darwin
            os: macos-13
          - target: x86_64-unknown-linux-gnu
            os: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}
      - uses: Swatinem/rust-cache@v2

      - name: Build
        run: cargo build --release --target ${{ matrix.target }}

      - name: Package
        shell: bash
        run: |
          cd target/${{ matrix.target }}/release
          tar czf sshkeeper-${{ matrix.target }}.tar.gz sshkeeper

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: sshkeeper-${{ matrix.target }}
          path: target/${{ matrix.target }}/release/sshkeeper-${{ matrix.target }}.tar.gz

  release:
    name: Create Release
    needs: build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/download-artifact@v4
        with:
          path: artifacts
          merge-multiple: true

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          files: artifacts/sshkeeper-*.tar.gz

  update-homebrew:
    name: Update Homebrew Formula
    needs: release
    runs-on: ubuntu-latest
    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts
          merge-multiple: true

      - name: Compute SHAs and version
        id: meta
        run: |
          echo "version=${GITHUB_REF_NAME#v}" >> "$GITHUB_OUTPUT"
          echo "sha_arm=$(shasum -a 256 artifacts/sshkeeper-aarch64-apple-darwin.tar.gz | awk '{print $1}')" >> "$GITHUB_OUTPUT"
          echo "sha_x86=$(shasum -a 256 artifacts/sshkeeper-x86_64-apple-darwin.tar.gz | awk '{print $1}')" >> "$GITHUB_OUTPUT"
          echo "sha_linux=$(shasum -a 256 artifacts/sshkeeper-x86_64-unknown-linux-gnu.tar.gz | awk '{print $1}')" >> "$GITHUB_OUTPUT"

      - name: Checkout homebrew-tap
        uses: actions/checkout@v4
        with:
          repository: nullhtp/homebrew-tap
          token: ${{ secrets.HOMEBREW_TAP_TOKEN }}
          path: homebrew-tap

      - name: Generate formula
        env:
          VERSION: ${{ steps.meta.outputs.version }}
          SHA_ARM: ${{ steps.meta.outputs.sha_arm }}
          SHA_X86: ${{ steps.meta.outputs.sha_x86 }}
          SHA_LINUX: ${{ steps.meta.outputs.sha_linux }}
        run: |
          cat > homebrew-tap/Formula/sshkeeper.rb << EOF
          class Sshkeeper < Formula
            desc "A cross-platform TUI for managing SSH connections"
            homepage "https://github.com/nullhtp/sshkeeper"
            version "${VERSION}"
            license "MIT"

            on_macos do
              if Hardware::CPU.arm?
                url "https://github.com/nullhtp/sshkeeper/releases/download/v${VERSION}/sshkeeper-aarch64-apple-darwin.tar.gz"
                sha256 "${SHA_ARM}"
              elsif Hardware::CPU.intel?
                url "https://github.com/nullhtp/sshkeeper/releases/download/v${VERSION}/sshkeeper-x86_64-apple-darwin.tar.gz"
                sha256 "${SHA_X86}"
              end
            end

            on_linux do
              url "https://github.com/nullhtp/sshkeeper/releases/download/v${VERSION}/sshkeeper-x86_64-unknown-linux-gnu.tar.gz"
              sha256 "${SHA_LINUX}"
            end

            def install
              bin.install "sshkeeper"
            end

            test do
              assert_match "sshkeeper", shell_output("#{bin}/sshkeeper --version 2>&1", 2)
            end
          end
          EOF

      - name: Push formula
        run: |
          cd homebrew-tap
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add Formula/sshkeeper.rb
          git diff --cached --quiet || git commit -m "Update sshkeeper to ${{ steps.meta.outputs.version }}" && git push
